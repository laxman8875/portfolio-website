<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Developer Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">PORT<span class="text-red">FOLIO</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="sections">
        <h2 class="section-title">Get In Touch</h2>
        <form id="contact-form" class="form-container">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit" class="btn btn-red">Send Message</button>
        </form>

        <div style="text-align: center; margin-top: 3rem;">
            <p style="color: #a1a1aa; margin-bottom: 1rem;">Or connect with me directly on:</p>
            <a href="https://linkedin.com/in/your-username" target="_blank" style="color: #ffffff; background: #222; padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; margin: 0 5px; border: 1px solid #333;">LinkedIn</a>
            <a href="https://github.com/your-username" target="_blank" style="color: #ffffff; background: #222; padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; margin: 0 5px; border: 1px solid #333;">GitHub</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Developer Portfolio. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
